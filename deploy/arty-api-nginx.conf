# Drop connections that don't match any named vhost
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    ssl_reject_handshake on;
}

server {
    listen 80;
    listen [::]:80;
    server_name crumbonium.duckdns.org;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /arty/ {
        root /var/www/html;
        autoindex off;
        index index.html;
        try_files $uri $uri/ =404;
    }

    location /arty/builds/ {
        root /var/www/html;
        fancyindex on;
        fancyindex_default_sort date_desc;
        fancyindex_localtime on;
    }

    location /bot/ {
        proxy_pass http://127.0.0.1:7779/;
        proxy_set_header Host $host;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:7778/;
        proxy_set_header Host $host;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name crumboniumjelly.duckdns.org;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name crumbonium.duckdns.org;
    server_tokens off;
    ssl_certificate /etc/letsencrypt/live/crumbonium.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crumbonium.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location ~* ^/(wp-admin|wp-login|xmlrpc\.php|wordpress|wp-content|wp-includes) {
        return 444;
    }

    location /jellyfin/ {
        proxy_pass http://10.0.0.45:8096/jellyfin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_buffering off;
    }

    location /arty/dashboard/ {
        root /var/www/html;
        autoindex off;
        index index.html;
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location /arty/ {
        root /var/www/html;
        autoindex off;
        index index.html;
        try_files $uri $uri/ =404;
    }

    location /arty/builds/ {
        root /var/www/html;
        fancyindex on;
        fancyindex_default_sort date_desc;
        fancyindex_localtime on;
    }

    location /srb2kart/ {
        root /var/www/html;
        autoindex on;
        disable_symlinks off;
    }

    location /bot/ {
        proxy_pass http://127.0.0.1:7779/;
        proxy_set_header Host $host;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:7778/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        access_log /var/log/nginx/access.log combined if=$loggable;
    }
    location /arty/zdash/ {
        root /var/www/html;
        autoindex off;
        index index.html;
        add_header Cache-Control "no-cache";
    }
    location /zan/ {
        proxy_pass http://127.0.0.1:7780/zan/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
    location /irc/ {
        proxy_pass http://127.0.0.1:7781/irc/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 5s;
    }
    location /ircdash/ {
        root /var/www/html;
        autoindex off;
        index index.html;
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name crumboniumjelly.duckdns.org;
    server_tokens off;
    ssl_certificate /etc/letsencrypt/live/crumboniumjelly.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crumboniumjelly.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://10.0.0.45:8096;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_buffering off;
    }
}
